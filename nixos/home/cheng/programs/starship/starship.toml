"$schema" = "https://starship.rs/config-schema.json"

format = """
[вХ≠вХі](cyan)\
$username\
$hostname\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
$jobs\
$status\
$cmd_duration\
\n\
[вФВ ](cyan)\
[\
[\\(=^гГїгГї^=\\)](cyan dimmed) \
$direnv\
$nix_shell\
$mise\
$package\
$c\
$cpp\
$cmake\
$rust\
$zig\
$haskell\
$golang\
$nodejs\
$deno\
$java\
$kotlin\
$gradle\
$ruby\
$python\
$lua\
$custom\
](dimmed)\
\n\
[вХ∞вФД](cyan)\
$character"""

[character]
disabled = false
success_symbol = '[вЮЬ](bold green)'
error_symbol = '[вЮЬ](bold red)'

[username]
disabled = false
format = '[$user]($style)'
style_user = 'cyan bold'
style_root = 'red bold'
show_always = false

[hostname]
disabled = false
format = '[@](white)[$hostname]($style) '
style = 'green bold'
ssh_only = true
trim_at = ''

[directory]
disabled = false
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'cyan bold'
read_only = ' у∞МЊ'
read_only_style = 'yellow'

[git_branch]
disabled = false
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'purple bold'
symbol = 'у∞Шђ '

[git_commit]
disabled = false
format = '[$hash]($style) '
style = 'purple bold'
only_detached = false
commit_hash_length = 7

[git_state]
disabled = false
format = '[$state($progress_current/$progress_total)]($style) '
style = "yellow bold"

[git_status]
disabled = false
format = '[$all_status$ahead_behind]($style) '
style = 'yellow bold'

[jobs]
disabled = false
format = '[$symbol$number]($style) '
style = 'blue bold'
symbol = '"'
symbol_threshold = 1
number_threshold = 1

[status]
disabled = false
format = '[$symbol$status( ^$signal_name)]($style) '
style = "red bold"
symbol = '*'
signal_symbol = '*'
sigint_symbol = '*'
not_executable_symbol = '?'
not_found_symbol = '?'

[cmd_duration]
disabled = false
format = '[ у∞ФЫ $duration]($style) '
style = 'yellow bold dimmed'
min_time = 2000

[direnv]
disabled = false
format = '[$symbol$loaded]($style) '
style = 'blue bold dimmed'
symbol = 'у∞М™ '
loaded_msg = 'direnv'
unloaded_msg = 'direnv?'
allowed_msg = 'direnv?'
denied_msg = 'direnv?'

[nix_shell]
disabled = false
format = '[$symbol$name]($style) '
style = 'blue bold dimmed'
symbol = 'у±ДЕ '

[mise]
disabled = false
format = '[$symbol$health]($style) '
style = "yellow dimmed"
symbol = 'у∞ЩЫ '
healthy_symbol = 'mise'
unhealthy_symbol = 'mise?'

[package]
disabled = false
format = '[$symbol$version]($style) '
style = 'purple bold dimmed'
symbol = 'у∞ПЦ '

[c]
disabled = false
format = '[$symbol($version(-$name))]($style) '
style = 'cyan bold dimmed'
symbol = "у∞Щ± "

[cpp]
disabled = false
format = '[$symbol($version(-$name))]($style) '
style = 'cyan bold dimmed'
symbol = "у∞Щ≤ "

[cmake]
disabled = false
format = '[$symbol($version)]($style) '
style = 'cyan bold dimmed'
symbol = "оЮФ "

[rust]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'у±ШЧ '

[zig]
disabled = false
format = '[$symbol($version)]($style) '
style = 'yellow bold dimmed'
symbol = 'о£ѓ '

[haskell]
disabled = false
format = '[$symbol($version)]($style) '
style = 'purple bold dimmed'
symbol = 'у∞≤Т '

[golang]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = "оШІ "

[java]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'у∞ђЈ '

[kotlin]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = 'у±ИЩ '

[gradle]
disabled = false
format = '[$symbol($version)]($style) '
style = 'cyan bold dimmed'
symbol = "оЯ≤ "

[nodejs]
disabled = false
format = '[$symbol($version)]($style) '
style = 'green bold dimmed'
symbol = 'у∞ОЩ '

[deno]
disabled = false
format = '[$symbol($version)]($style) '
style = 'green bold dimmed'
symbol = "оЯА "

[ruby]
disabled = false
format = '[$symbol($version)]($style) '
style = 'red bold dimmed'
symbol = 'у∞і≠ '

[python]
disabled = false
format = '[${symbol}${pyenv_prefix}${version}(\($virtualenv\))]($style) '
style = 'yellow bold dimmed'
symbol = 'у∞М† '

[lua]
disabled = false
format = '[$symbol($version)]($style) '
style = 'blue bold dimmed'
symbol = 'у∞Ґ± '

[os]
disabled = true
format = '[$symbol]($style)]'
symbols = { AIX = 'AIX ', AlmaLinux = 'пМЭ ', Alpaquita = 'пЕЉ ', Alpine = 'пМА ', Amazon = 'пЙ∞ ', Android = 'пЕї ', Arch = 'пМГ ', Artix = 'пМЯ ', Bluefin = 'пЕЉ ', CachyOS = 'пЕЉ ', CentOS = 'пМД ', Debian = 'пМЖ ', DragonFly = 'оїЄ ', Emscripten = 'пГБ ', EndeavourOS = 'пМҐ ', Fedora = 'пМК ', FreeBSD = 'пММ ', Garuda = 'пМЈ ', Gentoo = 'пМН ', HardenedBSD = 'пАУ ', Illumos = 'пМ¶ ', Kali = 'пМІ ', Linux = 'пЕЉ ', Mabox = 'оµµ ', Macos = 'пМВ ', Manjaro = 'пМТ ', Mariner = 'пАУ ', MidnightBSD = 'пАУ ', Mint = 'пМО ', NetBSD = 'у∞Ы≥ ', NixOS = 'пМУ ', Nobara = 'пОА ', OpenBSD = 'пМ® ', OpenCloudOS = 'пГВ ', OracleLinux = 'о°Щ ', Pop = 'пМ™ ', Raspbian = 'пМХ ', RedHatEnterprise = 'пМЦ ', Redhat = 'пМЦ ', Redox = 'пМ£ ', RockyLinux = 'пМЂ ', SUSE = 'пМФ ', Solus = 'пМ≠ ', Ubuntu = 'пМЫ ', Ultramarine = 'пАУ ', Unknown = 'пАУ ', Uos = 'U ', Void = 'пМЃ  ', Windows = 'пЕЇ ', openEuler = 'пАУ ', openSUSE = 'пМФ ' }
